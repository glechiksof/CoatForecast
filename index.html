<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoatForecast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="bg-orbs" aria-hidden="true">
      <span class="orb orb-1"></span>
      <span class="orb orb-2"></span>
      <span class="orb orb-3"></span>
    </div>

    <header>
      <div class="logo">
        <span class="logo-icon">🌤️</span>
        <h1>CoatForecast</h1>
      </div>
      <p class="tagline">Your daily outfit advisor</p>
    </header>

    <main>
      <section class="search">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input
            id="city-input"
            type="text"
            placeholder="Search a city…"
            autocomplete="off"
          />
          <button id="search-btn">Go</button>
        </div>
        <ul id="suggestions" class="suggestions" hidden></ul>
      </section>

      <section id="forecast-section" class="section" hidden>
        <div class="section-header">
          <h2><span class="section-icon">📅</span> Forecast</h2>
          <p id="city-label" class="city-label"></p>
          <p id="date-label" class="date-label" hidden></p>
        </div>
        <div id="forecast-cards" class="forecast-cards"></div>
      </section>

      <section id="clothing-section" class="section" hidden>
        <div class="section-header">
          <h2><span class="section-icon">👗</span> What to wear</h2>
          <p id="clothing-hour-label" class="hour-label"></p>
        </div>
        <div id="clothing-items" class="clothing-items"></div>
      </section>
    </main>

    <footer>
      <span id="env-badge" class="env-badge"></span>
      <span>Weather by <a href="https://open-meteo.com" target="_blank">Open-Meteo</a></span>
      <button id="break-btn" style="opacity:0;width:48px;height:32px;border:none;background:transparent;cursor:default" tabindex="-1" aria-hidden="true"></button>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
